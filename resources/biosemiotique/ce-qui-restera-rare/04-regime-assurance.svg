.cm-04 .cm-04-p1{fill:var(--oxide,#a84e2f);opacity:0.55}</style><text x="60" y="28" class="l ox h">PL.&#8202;04 / RÉGIME DE PREUVE</text><text x="940" y="28" text-anchor="end" class="ll h">CINQ COUCHES × CINQ QUESTIONS</text><text x="500" y="686" text-anchor="middle" class="ll ox h">LA COLONNE QUI RESTE VIDE EST LE PROGRAMME DE LA DISCIPLINE</text><path d="M52 52H948" class="r"/><text x="60" y="96" class="ts">Ce que chaque couche peut établir</text><text x="60" y="119" class="ll">CINQ COUCHES · CE QU’ELLES OBSERVENT · CE QU’ELLES PEUVENT CONCLURE</text><text x="60" y="152" class="l ox">À QUELLE QUESTION CHAQUE COUCHE PEUT-ELLE RÉPONDRE ?</text><rect x="812" y="166" width="128" height="438" fill="url(#cm-04-stipox)" opacity=".45"/><rect x="812" y="166" width="128" height="438" fill="none" stroke="var(--oxide,#a84e2f)" stroke-width="1" stroke-dasharray="5 4" vector-effect="non-scaling-stroke"/><text x="364" y="182" class="ll h" text-anchor="middle">Qu’a-t-on</text><text x="364" y="196" class="ll h" text-anchor="middle">déclaré ?</text><text x="492" y="182" class="ll h" text-anchor="middle">Qu’est-il autorisé</text><text x="492" y="196" class="ll h" text-anchor="middle">à faire ?</text><text x="620" y="182" class="ll h" text-anchor="middle">Qu’a-t-il</text><text x="620" y="196" class="ll h" text-anchor="middle">fait ?</text><text x="748" y="182" class="ll h" text-anchor="middle">Que fait-il quand</text><text x="748" y="196" class="ll h" text-anchor="middle">on le teste ?</text><text x="876" y="182" class="ll ox h" text-anchor="middle">Que contient-il</text><text x="876" y="196" class="ll ox h" text-anchor="middle">qui ne s’est</text><text x="876" y="210" class="ll ox h" text-anchor="middle">jamais manifesté ?</text><path d="M300 226H940" class="r"/><path d="M310 166V604" class="rl"/><text x="60" y="258" class="num">01</text><text x="98" y="260" class="rn">Provenance et intégrité</text><text x="98" y="278" class="lo">OBSERVE : MANIFESTES, SIGNATURES</text><circle cx="364" cy="252" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M486 252 h13" class="rl"/><path d="M614 252 h13" class="rl"/><path d="M742 252 h13" class="rl"/><path d="M870 252 h13" class="rl"/><text x="60" y="330" class="num">02</text><text x="98" y="332" class="rn">Contrôle opérationnel</text><text x="98" y="350" class="lo">OBSERVE : PERMISSIONS, OUTILS</text><circle cx="492" cy="324" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M358 324 h13" class="rl"/><path d="M614 324 h13" class="rl"/><path d="M742 324 h13" class="rl"/><path d="M870 324 h13" class="rl"/><text x="60" y="402" class="num">03</text><text x="98" y="404" class="rn">Observabilité</text><text x="98" y="422" class="lo">OBSERVE : JOURNAUX, TÉLÉMÉTRIE</text><circle cx="620" cy="396" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M358 396 h13" class="rl"/><path d="M486 396 h13" class="rl"/><path d="M742 396 h13" class="rl"/><path d="M870 396 h13" class="rl"/><text x="60" y="474" class="num">04</text><text x="98" y="476" class="rn">Évaluation externe</text><text x="98" y="494" class="lo">OBSERVE : ENTRÉES ET SORTIES</text><circle cx="748" cy="468" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M358 468 h13" class="rl"/><path d="M486 468 h13" class="rl"/><path d="M614 468 h13" class="rl"/><path d="M870 468 h13" class="rl"/><path d="M60 518H940" class="rgd"/><text x="60" y="558" class="num">05</text><text x="98" y="560" class="rn">Inspection interne</text><text x="98" y="578" class="lo">OBSERVE : POIDS, ACTIVATIONS</text><text x="98" y="592" class="lo ox">SANS PRATIQUE NI STANDARD PARTAGÉ</text><circle cx="364" cy="552" r="14" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3" vector-effect="non-scaling-stroke"/><circle cx="748" cy="552" r="14" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3" vector-effect="non-scaling-stroke"/><circle cx="876" cy="552" r="14" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3" vector-effect="non-scaling-stroke"/><path d="M486 552 h13" class="rl"/><path d="M614 552 h13" class="rl"/><path d="M60 604H940" class="r"/><circle cx="70" cy="630" r="9" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><text x="88" y="634" class="ll">ÉTABLI : LA COUCHE RÉPOND À LA QUESTION</text><circle cx="70" cy="658" r="9" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3" vector-effect="non-scaling-stroke"/><text x="88" y="662" class="ll ox">INDICE : ELLE PRODUIT UNE PIÈCE, ELLE NE CONCLUT PAS</text><path d="M472 630 h13" class="rl"/><text x="496" y="634" class="ll">HORS DE SA PORTÉE</text><text x="940" y="634" class="ll ox" text-anchor="end">AUCUNE MARQUE PLEINE DANS LA DERNIÈRE COLONNE</text><text x="940" y="662" class="ll" text-anchor="end">DÉTECTION POSITIVE ≠ ASSURANCE NÉGATIVE</text></svg>
