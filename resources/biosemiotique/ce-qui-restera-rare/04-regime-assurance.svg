.cm-04 text{fill:var(--ink,#1c1c18)}
.cm-04 .ts{font-family:var(--font-editorial,"Newsreader",Georgia,serif);font-size:25px;font-weight:500;letter-spacing:-.015em}
.cm-04 .tsm{font-family:var(--font-editorial,"Newsreader",Georgia,serif);font-size:18px;font-weight:500;letter-spacing:-.01em}
