<svg class="cm-diagram cm-04" viewBox="0 0 1000 706" role="img" aria-labelledby="cm-04-t cm-04-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-04-t">Ce que chaque couche du régime d'assurance peut établir</title><desc id="cm-04-d">Matrice croisant les cinq couches du régime d'assurance et les questions auxquelles chacune peut répondre. Chaque couche porte la mention de ce qu'elle observe : manifestes et signatures, permissions et outils, journaux et télémétrie, entrées et sorties, poids et activations. Les quatre premières forment une diagonale de marques pleines — chacune établit sa propre question et aucune autre — et chacune prolonge une pratique déjà instituée. La cinquième, l'inspection interne, est la seule sans équivalent mature ni standard partagé. La dernière colonne — ce que le modèle contient qui ne s'est jamais manifesté — ne reçoit aucune marque pleine. Seule l'inspection interne y porte une marque pointillée : elle produit un indice, elle ne conclut pas. C'est l'écart entre détection positive et assurance négative.</desc><defs><pattern id="cm-04-ink3" width="3.2" height="3.2" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-04-p0" x1="0" y1="0" x2="0" y2="3.2"/></pattern><pattern id="cm-04-stipox" width="6.0" height="6.0" patternUnits="userSpaceOnUse"><circle class="cm-04-p1" cx="3.0" cy="3.0" r="0.8"/><circle class="cm-04-p1" cx="0" cy="0" r="0.8"/><circle class="cm-04-p1" cx="6.0" cy="6.0" r="0.8"/><circle class="cm-04-p1" cx="0" cy="6.0" r="0.8"/><circle class="cm-04-p1" cx="6.0" cy="0" r="0.8"/></pattern></defs><style>.cm-04 .r{fill:none;stroke:var(--ink,#1c1c18);stroke-width:1;vector-effect:non-scaling-stroke}
