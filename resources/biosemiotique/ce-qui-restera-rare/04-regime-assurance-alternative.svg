<svg class="cm-diagram cm-04" viewBox="0 0 1000 660" role="img" aria-labelledby="cm-04-t cm-04-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-04-t">Ce que chaque couche du régime d'assurance peut établir</title><desc id="cm-04-d">Matrice croisant les cinq couches du régime d'assurance et les questions auxquelles chacune peut répondre. Les quatre premières couches forment une diagonale de marques pleines : chacune établit sa propre question et aucune autre. La dernière colonne — ce que le modèle contient qui ne s'est jamais manifesté — ne reçoit aucune marque pleine. Seule l'inspection interne y porte une marque pointillée : elle produit un indice, elle ne conclut pas. C'est l'écart entre détection positive et assurance négative.</desc><defs><pattern id="cm-04-ink1" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="9" stroke="var(--ink,#1c1c18)" stroke-width="0.5" opacity=".26"/></pattern><pattern id="cm-04-ink2" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="var(--ink,#1c1c18)" stroke-width="0.6" opacity=".34"/></pattern><pattern id="cm-04-ink3" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="3" stroke="var(--ink,#1c1c18)" stroke-width="0.7" opacity=".44"/></pattern><pattern id="cm-04-inkx" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M0 0V5M0 0H5" fill="none" stroke="var(--ink,#1c1c18)" stroke-width="0.55" opacity=".38"/></pattern><pattern id="cm-04-ox1" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="9" stroke="var(--oxide,#a84e2f)" stroke-width="0.6" opacity=".34"/></pattern><pattern id="cm-04-ox2" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="var(--oxide,#a84e2f)" stroke-width="0.7" opacity=".46"/></pattern><pattern id="cm-04-oxx" width="4.5" height="4.5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M0 0V4.5M0 0H4.5" fill="none" stroke="var(--oxide,#a84e2f)" stroke-width="0.6" opacity=".5"/></pattern><pattern id="cm-04-bl1" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line x1="0" y1="0" x2="0" y2="9" stroke="var(--blue,#2d5b8a)" stroke-width="0.6" opacity=".34"/></pattern><pattern id="cm-04-bl2" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line x1="0" y1="0" x2="0" y2="5" stroke="var(--blue,#2d5b8a)" stroke-width="0.7" opacity=".46"/></pattern><pattern id="cm-04-ms1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line x1="0" y1="0" x2="0" y2="8" stroke="var(--moss,#52634e)" stroke-width="0.6" opacity=".38"/></pattern><pattern id="cm-04-stip" width="7" height="7" patternUnits="userSpaceOnUse"><circle cx="3.5" cy="3.5" r="0.75" fill="var(--graphite,#57564f)" opacity=".5"/><circle cx="0" cy="0" r="0.75" fill="var(--graphite,#57564f)" opacity=".5"/><circle cx="7" cy="7" r="0.75" fill="var(--graphite,#57564f)" opacity=".5"/></pattern><pattern id="cm-04-stipd" width="4.5" height="4.5" patternUnits="userSpaceOnUse"><circle cx="2.25" cy="2.25" r="0.7" fill="var(--graphite,#57564f)" opacity=".62"/><circle cx="0" cy="0" r="0.7" fill="var(--graphite,#57564f)" opacity=".62"/><circle cx="4.5" cy="4.5" r="0.7" fill="var(--graphite,#57564f)" opacity=".62"/></pattern><pattern id="cm-04-stipox" width="6" height="6" patternUnits="userSpaceOnUse"><circle cx="3.0" cy="3.0" r="0.8" fill="var(--oxide,#a84e2f)" opacity=".55"/><circle cx="0" cy="0" r="0.8" fill="var(--oxide,#a84e2f)" opacity=".55"/><circle cx="6" cy="6" r="0.8" fill="var(--oxide,#a84e2f)" opacity=".55"/></pattern><marker id="cm-04-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1l8 4-8 4" fill="none" stroke="var(--ink,#1c1c18)" stroke-width="1.3"/></marker><marker id="cm-04-arox" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1l8 4-8 4" fill="none" stroke="var(--oxide,#a84e2f)" stroke-width="1.3"/></marker><marker id="cm-04-arbl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1l8 4-8 4" fill="none" stroke="var(--blue,#2d5b8a)" stroke-width="1.3"/></marker></defs><style>.cm-04 .r{fill:none;stroke:var(--ink,#1c1c18);stroke-width:1;vector-effect:non-scaling-stroke}
.cm-04 .rf{fill:none;stroke:var(--ink,#1c1c18);stroke-width:.6;vector-effect:non-scaling-stroke}
.cm-04 .rl{fill:none;stroke:var(--line,#c9c1b3);stroke-width:.8;vector-effect:non-scaling-stroke}
.cm-04 .rg{fill:none;stroke:var(--line,#c9c1b3);stroke-width:.8;stroke-dasharray:2 6;vector-effect:non-scaling-stroke}
.cm-04 .rox{fill:none;stroke:var(--oxide,#a84e2f);stroke-width:1.6;vector-effect:non-scaling-stroke}
.cm-04 .rbl{fill:none;stroke:var(--blue,#2d5b8a);stroke-width:1.6;vector-effect:non-scaling-stroke}
.cm-04 .rdash{fill:none;stroke:var(--graphite,#57564f);stroke-width:.9;stroke-dasharray:3 5;vector-effect:non-scaling-stroke}
.cm-04 .rgd{fill:none;stroke:var(--oxide,#a84e2f);stroke-width:.8;stroke-dasharray:2 5;vector-effect:non-scaling-stroke}
.cm-04 .card{fill:var(--paper,#f3efe6);stroke:var(--ink,#1c1c18);stroke-width:.9;vector-effect:non-scaling-stroke}
.cm-04 .cardl{fill:var(--paper,#f3efe6);stroke:var(--line,#c9c1b3);stroke-width:.8;vector-effect:non-scaling-stroke}
.cm-04 .t{fill:var(--ink,#1c1c18);font:500 15px "Inter",Arial,sans-serif}
.cm-04 .ts{fill:var(--ink,#1c1c18);font:500 24px "Newsreader",Georgia,serif;letter-spacing:-.01em}
.cm-04 .tsm{fill:var(--ink,#1c1c18);font:500 19px "Newsreader",Georgia,serif;letter-spacing:-.01em}
.cm-04 .l{fill:var(--graphite,#57564f);font:500 11.5px "IBM Plex Mono",ui-monospace,monospace;letter-spacing:.07em}
.cm-04 .ll{fill:var(--graphite,#57564f);font:500 10px "IBM Plex Mono",ui-monospace,monospace;letter-spacing:.09em}
.cm-04 .num{fill:var(--oxide,#a84e2f);font:500 13px "IBM Plex Mono",ui-monospace,monospace;letter-spacing:.04em}
.cm-04 .val{fill:var(--ink,#1c1c18);font:500 17px "IBM Plex Mono",ui-monospace,monospace}
.cm-04 .ox{fill:var(--oxide,#a84e2f)}
.cm-04 .bl{fill:var(--blue,#2d5b8a)}
.cm-04 .ms{fill:var(--moss,#52634e)}
.cm-04 .h{paint-order:stroke;stroke:var(--paper,#f3efe6);stroke-width:4px;stroke-linejoin:round}</style><text x="60" y="28" class="l ox h">PL. 04 / RÉGIME DE PREUVE</text><text x="940" y="28" text-anchor="end" class="ll h">CINQ COUCHES × CINQ QUESTIONS</text><text x="500" y="640" text-anchor="middle" class="ll ox h">LA COLONNE QUI RESTE VIDE EST LE PROGRAMME DE LA DISCIPLINE</text><path d="M52 52H948" class="r"/><text x="60" y="88" class="l ox">À QUELLE QUESTION CHAQUE COUCHE PEUT-ELLE RÉPONDRE ?</text><rect x="812" y="102" width="128" height="434" fill="url(#cm-04-stipox)" stroke="none" opacity=".5"/><rect x="812" y="102" width="128" height="434" fill="none" stroke="var(--oxide,#a84e2f)" stroke-width="1" stroke-dasharray="5 4"/><text x="364" y="120" text-anchor="middle" class="ll h">Qu’a-t-on</text><text x="364" y="135" text-anchor="middle" class="ll h">déclaré ?</text><text x="492" y="120" text-anchor="middle" class="ll h">Qu’est-il autorisé</text><text x="492" y="135" text-anchor="middle" class="ll h">à faire ?</text><text x="620" y="120" text-anchor="middle" class="ll h">Qu’a-t-il</text><text x="620" y="135" text-anchor="middle" class="ll h">fait ?</text><text x="748" y="120" text-anchor="middle" class="ll h">Que fait-il quand</text><text x="748" y="135" text-anchor="middle" class="ll h">on le teste ?</text><text x="876" y="120" text-anchor="middle" class="ll ox h">Que contient-il qui</text><text x="876" y="135" text-anchor="middle" class="ll ox h">ne s’est jamais</text><text x="876" y="150" text-anchor="middle" class="ll ox h">manifesté ?</text><path d="M300 172H940" class="r"/><path d="M300 102V536" class="rl"/><text x="60" y="214" class="num">01</text><text x="98" y="216" class="tsm">Provenance et intégrité</text><text x="98" y="236" class="ll">MANIFESTES · SIGNATURES</text><circle cx="364" cy="212" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2"/><path d="M486 212 h13" class="rl"/><path d="M614 212 h13" class="rl"/><path d="M742 212 h13" class="rl"/><path d="M870 212 h13" class="rl"/><text x="60" y="286" class="num">02</text><text x="98" y="288" class="tsm">Contrôle opérationnel</text><text x="98" y="308" class="ll">PERMISSIONS · OUTILS</text><path d="M358 284 h13" class="rl"/><circle cx="492" cy="284" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2"/><path d="M614 284 h13" class="rl"/><path d="M742 284 h13" class="rl"/><path d="M870 284 h13" class="rl"/><text x="60" y="358" class="num">03</text><text x="98" y="360" class="tsm">Observabilité</text><text x="98" y="380" class="ll">JOURNAUX · TÉLÉMÉTRIE</text><path d="M358 356 h13" class="rl"/><path d="M486 356 h13" class="rl"/><circle cx="620" cy="356" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2"/><path d="M742 356 h13" class="rl"/><path d="M870 356 h13" class="rl"/><text x="60" y="430" class="num">04</text><text x="98" y="432" class="tsm">Évaluation externe</text><text x="98" y="452" class="ll">BENCHMARKS · RED TEAMING</text><path d="M358 428 h13" class="rl"/><path d="M486 428 h13" class="rl"/><path d="M614 428 h13" class="rl"/><circle cx="748" cy="428" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2"/><path d="M870 428 h13" class="rl"/><path d="M60 466 H940" class="rgd"/><text x="60" y="502" class="num">05</text><text x="98" y="504" class="tsm">Inspection interne</text><text x="98" y="524" class="ll">POIDS · ACTIVATIONS · REPRÉSENTATIONS</text><circle cx="364" cy="500" r="14" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3"/><path d="M486 500 h13" class="rl"/><path d="M614 500 h13" class="rl"/><circle cx="748" cy="500" r="14" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3"/><circle cx="876" cy="500" r="14" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1.2" stroke-dasharray="4 3"/><path d="M60 536H940" class="r"/><circle cx="70" cy="570" r="9" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1"/><text x="86" y="574" class="ll">ÉTABLI : LA COUCHE RÉPOND À LA QUESTION</text><circle cx="70" cy="596" r="9" fill="url(#cm-04-stipox)" stroke="var(--oxide,#a84e2f)" stroke-width="1" stroke-dasharray="3 2"/><text x="86" y="600" class="ll ox">INDICE : ELLE PRODUIT UNE PIÈCE, ELLE NE CONCLUT PAS</text><path d="M460 570 h13" class="rl"/><text x="486" y="574" class="ll">HORS DE SA PORTÉE</text><text x="940" y="574" text-anchor="end" class="ll ox">AUCUNE MARQUE PLEINE DANS LA DERNIÈRE COLONNE</text><text x="940" y="600" text-anchor="end" class="ll">DÉTECTION POSITIVE ≠ ASSURANCE NÉGATIVE</text></svg>
