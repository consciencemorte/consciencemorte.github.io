<style>
:root{--paper:#f3efe6;--paper-deep:#e8e0d2;--ink:#1c1c18;--graphite:#57564f;--line:#c9c1b3;--oxide:#a84e2f;--moss:#52634e;--blue:#2d5b8a;

:root[data-theme="dark"]{--paper:#171713;--paper-deep:#22221d;--ink:#e9e4d8;--graphite:#a7a297;--line:#3a3932;--oxide:#d07a58;--moss:#91a18a;--blue:#7ba1c9}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-editorial);font-size:18px;line-height:1.55}
.prose{max-width:var(--content);margin:60px auto 120px;padding:0 24px}
.prose .cm-figure,.prose figure{margin:2.7em max(-7vw,-80px)}
.prose figcaption{margin-top:12px;color:var(--graphite);font:11px/1.5 var(--font-interface)}
.prose figcaption::before{content:"FIG. ";color:var(--oxide);font-family:var(--font-code)}
.cm-plate svg{display:block;width:100%;height:auto;overflow:visible}
@media (max-width:740px){
 .cm-plate-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
 .cm-plate-scroll svg{min-width:720px}
 .cm-plate figcaption::after{content:" — faire glisser pour lire la planche entière";color:var(--oxide)}}
@media print{.cm-plate-scroll{overflow:visible}.cm-plate-scroll svg{min-width:0}}
.bar{position:fixed;top:14px;right:14px;z-index:9;display:flex;gap:8px}
.bar button{font:600 9px var(--font-interface);letter-spacing:.09em;text-transform:uppercase;padding:9px 12px;border:1px solid var(--line);background:var(--paper);color:var(--ink);cursor:pointer}
.bar button:hover{border-color:var(--oxide);color:var(--oxide)}
h1{font-size:34px;font-weight:500;letter-spacing:-.03em;margin:0 0 6px}
.sub{color:var(--graphite);font:10px var(--font-code);letter-spacing:.1em;text-transform:uppercase}
</style></head><body>

<figure class="cm-figure cm-plate"><div class="cm-plate-scroll"><svg class="cm-diagram cm-02" viewBox="0 0 1000 780" role="img" aria-labelledby="cm-02-t cm-02-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-02-t">Concentration de la frontière et prolifération de son sillage</title><desc id="cm-02-d">Deux registres partagent le même axe de temps, de 2023 à 2028, coupé par une verticale à juillet 2026 qui sépare ce qui est mesuré de ce qui est projeté. Registre du haut : une bande contre-hachurée dense figure la frontière fermée, tenue par quatre à six laboratoires et resserrée sur vingt-cinq points Elo. En dessous court la ligne du meilleur modèle ouvert ; l'écart hachuré entre les deux ne converge pas, il se referme puis se rouvre par vagues — deux valeurs sont relevées, zéro virgule cinq pour cent en août 2024 et trois virgule trois pour cent en mars 2026 ; le tracé qui les relie est schématique. Le registre du haut s'arrête à juillet 2026, où s'arrêtent les mesures citées. Registre du bas : le sillage. Trois canaux — distillation, imitation, ouverture des poids — descendent de la frontière vers un coin qui s'élargit, peuplé d'anneaux de plus en plus nombreux. Chaque anneau figure un modèle ; les anneaux en pointillé sont projetés. La projection retenue place entre cent et trois cents modèles au-dessus du seuil de calcul de l'AI Act d'ici la fin de 2028.</desc><defs><pattern id="cm-02-oxx" width="4.5" height="4.5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path class="cm-02-p0" d="M0 0V4.5M0 0H4.5"/></pattern><pattern id="cm-02-ox1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-02-p1" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-02-stip" width="6.0" height="6.0" patternUnits="userSpaceOnUse"><circle class="cm-02-p2" cx="3.0" cy="3.0" r="0.8"/><circle class="cm-02-p2" cx="0" cy="0" r="0.8"/><circle class="cm-02-p2" cx="6.0" cy="6.0" r="0.8"/><circle class="cm-02-p2" cx="0" cy="6.0" r= <figure class="cm-figure cm-plate"><div class="cm-plate-scroll"><svg class="cm-diagram cm-03" viewBox="0 0 1000 790" role="img" aria-labelledby="cm-03-t cm-03-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-03-t">Chaîne d'approvisionnement cognitive : filière déclarée et dépôt effectif</title><desc id="cm-03-d">La planche superpose deux registres alignés sur les mêmes sept colonnes. En haut, les sept maillons de la filière — préentraîner, post-entraîner, distiller, adapter, greffer des adaptateurs, quantifier, intégrer — répartis entre sept acteurs, au-dessus d'une ligne de provenance déclarée faite de signatures, de manifestes, de licences et de versions : ce que la nomenclature peut nommer. En bas, la coupe du même artefact aux mêmes colonnes. Les strates ne traversent pas toute la coupe : chacune commence à la colonne du maillon qui l'a déposée, et l'angle de sa hachure désigne cette origine. La strate des garde-fous, déposée au post-entraînement, se pince brutalement à la colonne de la distillation puis reste mince : les capacités passent, les garde-fous ne suivent pas nécessairement. La strate la plus épaisse, celle des dispositions non identifiées, est rendue en pointillé et s'épaissit à chaque transformation sans se rattacher à aucune colonne d'origine.</desc><defs><marker id="cm-03-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-03-p0" d="M1 1l8 4-8 4"/></marker><marker id="cm-03-arbl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-03-p1" d="M1 1l8 4-8 4"/></marker><pattern id="cm-03-cap" width="5.5" height="5.5" patternUnits="userSpaceOnUse" patternTransform="rotate(20)"><line class="cm-03-p2" x1="0" y1="0" x2="0" y2="5.5"/></pattern><pattern id="cm-03-gf" width="4.0" height="4.0" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-03-p3" x1="0" y1="0" x2="0" y2="4.0"/></pattern><pattern id="cm-03-tr" width="5.5" height= <figure class="cm-figure cm-plate"><div class="cm-plate-scroll"><svg class="cm-diagram cm-04" viewBox="0 0 1000 706" role="img" aria-labelledby="cm-04-t cm-04-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-04-t">Ce que chaque couche du régime d'assurance peut établir</title><desc id="cm-04-d">Matrice croisant les cinq couches du régime d'assurance et les questions auxquelles chacune peut répondre. Chaque couche porte la mention de ce qu'elle observe : manifestes et signatures, permissions et outils, journaux et télémétrie, entrées et sorties, poids et activations. Les quatre premières forment une diagonale de marques pleines — chacune établit sa propre question et aucune autre — et chacune prolonge une pratique déjà instituée. La cinquième, l'inspection interne, est la seule sans équivalent mature ni standard partagé. La dernière colonne — ce que le modèle contient qui ne s'est jamais manifesté — ne reçoit aucune marque pleine. Seule l'inspection interne y porte une marque pointillée : elle produit un indice, elle ne conclut pas. C'est l'écart entre détection positive et assurance négative.</desc><defs><pattern id="cm-04-ink3" width="3.2" height="3.2" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-04-p0" x1="0" y1="0" x2="0" y2="3.2"/></pattern><pattern id="cm-04-stipox" width="6.0" height="6.0" patternUnits="userSpaceOnUse"><circle class="cm-04-p1" cx="3.0" cy="3.0" r="0.8"/><circle class="cm-04-p1" cx="0" cy="0" r="0.8"/><circle class="cm-04-p1" cx="6.0" cy="6.0" r="0.8"/><circle class="cm-04-p1" cx="0" cy="6.0" r="0.8"/><circle class="cm-04-p1" cx="6.0" cy="0" r="0.8"/></pattern></defs><style>.cm-04 .r{fill:none;stroke:var(--ink,#1c1c18);stroke-width:1;vector-effect:non-scaling-stroke}

ext><text x="876" y="210" class="ll ox h" text-anchor="middle">jamais manifesté ?</text><path d="M300 226H940" class="r"/><path d="M310 166V604" class="rl"/><text x="60" y="258" class="num">01</text><text x="98" y="260" class="rn">Provenance et intégrité</text><text x="98" y="278" class="lo">OBSERVE : MANIFESTES, SIGNATURES</text><text x="98" y="292" class="lo" opacity=".75">PROLONGE UNE PRATIQUE INSTITUÉE</text><circle cx="364" cy="252" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M486 252 h13" class="rl"/><path d="M614 252 h13" class="rl"/><path d="M742 252 h13" class="rl"/><path d="M870 252 h13" class="rl"/><text x="60" y="330" class="num">02</text><text x="98" y="332" class="rn">Contrôle opérationnel</text><text x="98" y="350" class="lo">OBSERVE : PERMISSIONS, OUTILS</text><text x="98" y="364" class="lo" opacity=".75">PROLONGE UNE PRATIQUE INSTITUÉE</text><circle cx="492" cy="324" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M358 324 h13" class="rl"/><path d="M614 324 h13" class="rl"/><path d="M742 324 h13" class="rl"/><path d="M870 324 h13" class="rl"/><text x="60" y="402" class="num">03</text><text x="98" y="404" class="rn">Observabilité</text><text x="98" y="422" class="lo">OBSERVE : JOURNAUX, TÉLÉMÉTRIE</text><text x="98" y="436" class="lo" opacity=".75">PROLONGE UNE PRATIQUE INSTITUÉE</text><circle cx="620" cy="396" r="14" fill="url(#cm-04-ink3)" stroke="var(--ink,#1c1c18)" stroke-width="1.2" vector-effect="non-scaling-stroke"/><path d="M358 396 h13" class="rl"/><path d="M486 396 h13" class="rl"/><path d="M742 396 h13" class="rl"/><path d="M870 396 h13" class="rl"/><text x="60" y="474" class="num">04</text><text x="98" y="476" class="rn">Évaluation externe</text><text x="98" y="494" class="lo">OBSERVE : ENTRÉES ET SORTIES</text><text x="98" y="508" class="lo" opacity=".75">PROLONGE UNE PRATIQUE INSTITUÉE <figure class="cm-figure cm-plate"><div class="cm-plate-scroll"><svg class="cm-diagram cm-05" viewBox="0 0 1000 700" role="img" aria-labelledby="cm-05-t cm-05-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-05-t">Protocole d'apprentissage subliminal et son témoin</title><desc id="cm-05-d">Un modèle de base M porte un trait implanté : il devient l'enseignant. L'enseignant produit de simples suites de nombres, tâche sans rapport sémantique avec le trait ; un filtrage retire du corpus toute mention explicite. Sur la planche, un ruban hachuré d'oxyde suit le trait et traverse la boîte du filtre sans s'interrompre. Le corpus filtré est ensuite servi à deux étudiants. L'étudiant de gauche est initialisé depuis M, le même modèle de base que l'enseignant : le ruban oxyde entre dans sa boîte et se superpose à sa propre trame ; il hérite du trait. L'étudiant de droite est initialisé depuis un modèle de base différent : le ruban s'arrête net devant lui, marqué d'une croix ; le trait ne passe pas. Le témoin de droite est ce qui borne le résultat : le filtrage sémantique ne garantit pas l'absence de transmission, mais la transmission suppose une initialisation commune.</desc><defs><pattern id="cm-05-ox2" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-05-p0" x1="0" y1="0" x2="0" y2="5"/></pattern><pattern id="cm-05-ox1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-05-p1" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-05-bl1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line class="cm-05-p2" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-05-ms1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line class="cm-05-p3" x1="0" y1="0" x2="0" y2="8"/></pattern><marker id="cm-05-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-05-p4" d="M1 1l8 <figure class="cm-figure cm-plate"><div class="cm-plate-scroll"><svg class="cm-diagram cm-06" viewBox="0 0 1000 660" role="img" aria-labelledby="cm-06-t cm-06-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-06-t">Structure de l'audit à l'aveugle d'un objectif caché</title><desc id="cm-06-d">Une red team entraîne un modèle porteur d'un objectif caché, puis le confie à quatre équipes séparées d'elle par une barrière informationnelle. La planche range ces équipes non par leur numéro mais par leur degré d'accès, du plus pauvre au plus riche. À gauche, une seule case : l'accès API. Au centre, trois cases empilées : l'API, un échantillon des données d'entraînement, les poids et les activations. À droite, quatre cases : les mêmes, plus l'outillage d'interprétabilité. Sous chaque pile, le résultat. La pile d'une seule case échoue ; les trois autres identifient l'objectif. Un trait d'oxyde marque le seuil entre la première pile et les suivantes : c'est là que se joue le résultat. Entre les deux dernières piles, un trait léger rappelle qu'il n'y a pas de seuil — avec ou sans autoencodeurs parcimonieux, les équipes qui ont le modèle et les données réussissent.</desc><defs><pattern id="cm-06-oxh" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p0" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-06-stipd" width="4.6" height="4.6" patternUnits="userSpaceOnUse"><circle class="cm-06-p1" cx="2.3" cy="2.3" r="0.7"/><circle class="cm-06-p1" cx="0" cy="0" r="0.7"/><circle class="cm-06-p1" cx="4.6" cy="4.6" r="0.7"/><circle class="cm-06-p1" cx="0" cy="4.6" r="0.7"/><circle class="cm-06-p1" cx="4.6" cy="0" r="0.7"/></pattern><pattern id="cm-06-t0" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p2" x1="0" y1="0" x2="0" y2="9"/></pattern><pattern id="cm-06-t1" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p3" x1="0" y1="0"
