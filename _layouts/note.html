---
layout: default
---
<article class="shell note-layout">
  <header class="note-heading">
    <a href="{{ '/notes/' | relative_url }}">← Carnet de laboratoire</a>
    <p class="eyebrow">Note / {{ page.date | date: '%d.%m.%Y' }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="prose">{{ content }}</div>
</article>
