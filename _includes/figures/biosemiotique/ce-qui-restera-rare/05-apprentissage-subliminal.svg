<svg class="cm-diagram cm-05" viewBox="0 0 1000 700" role="img" aria-labelledby="cm-05-t cm-05-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-05-t">Protocole d'apprentissage subliminal et son témoin</title><desc id="cm-05-d">Un modèle de base M porte un trait implanté : il devient l'enseignant. L'enseignant produit de simples suites de nombres, tâche sans rapport sémantique avec le trait ; un filtrage retire du corpus toute mention explicite. Sur la planche, un ruban hachuré d'oxyde suit le trait et traverse la boîte du filtre sans s'interrompre. Le corpus filtré est ensuite servi à deux étudiants. L'étudiant de gauche est initialisé depuis M, le même modèle de base que l'enseignant : le ruban oxyde entre dans sa boîte et se superpose à sa propre trame ; il hérite du trait. L'étudiant de droite est initialisé depuis un modèle de base différent : le ruban s'arrête net devant lui, marqué d'une croix ; le trait ne passe pas. Le témoin de droite est ce qui borne le résultat : le filtrage sémantique ne garantit pas l'absence de transmission, mais la transmission suppose une initialisation commune.</desc><defs><pattern id="cm-05-ox2" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-05-p0" x1="0" y1="0" x2="0" y2="5"/></pattern><pattern id="cm-05-ox1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-05-p1" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-05-bl1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line class="cm-05-p2" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-05-ms1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)"><line class="cm-05-p3" x1="0" y1="0" x2="0" y2="8"/></pattern><marker id="cm-05-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-05-p4" d="M1 1l8 4-8 4"/></marker><marker id="cm-05-arox" viewBox="0 0 10 10" re