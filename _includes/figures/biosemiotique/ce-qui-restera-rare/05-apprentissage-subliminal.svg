.cm-05 .cm-05-p6{fill:none;stroke:var(--graphite,#57564f);stroke-width:1.3}</style><text x="60" y="28" class="l ox h">PL.&#8202;05 / TRANSMISSION COMPORTEMENTALE</text><text x="940" y="28" text-anchor="end" class="ll h">L’EXPÉRIENCE ET SON TÉMOIN</text><text x="500" y="680" text-anchor="middle" class="ll ox h">CE QUI BORNE LE RÉSULTAT EST AUSSI CE QUI LE DÉMONTRE</text><path d="M52 52H948" class="r"/><text x="60" y="96" class="ts">Ce qui passe le filtre</text><text x="60" y="119" class="ll">MÊME ENSEIGNANT · MÊME CORPUS FILTRÉ · DEUX ÉTUDIANTS, DEUX INITIALISATIONS</text><rect x="60" y="170" width="230" height="66" class="card"/><text x="175" y="198" class="tsm" text-anchor="middle">Modèle de base M</text><text x="175" y="220" class="ll" text-anchor="middle">GPT-4.1 DANS L’EXPÉRIENCE</text><path d="M292 203h22" class="r" marker-end="url(#cm-05-ar)"/><rect x="326" y="170" width="240" height="66" fill="url(#cm-05-ox2)" stroke="var(--oxide,#a84e2f)" stroke-width="1.3" vector-effect="non-scaling-stroke"/><text x="446" y="196" class="ts h" text-anchor="middle">Enseignant</text><text x="446" y="216" class="ll ox h" text-anchor="middle">TRAIT IMPLANTÉ : « HIBOU »</text><text x="446" y="230" class="ll h" text-anchor="middle">PAR PROMPT OU FINE-TUNING</text><path d="M568 203h22" class="rox" marker-end="url(#cm-05-arox)"/><rect x="602" y="170" width="338" height="66" fill="url(#cm-05-ox1)" stroke="var(--oxide,#a84e2f)" stroke-width="1.1" vector-effect="non-scaling-stroke"/><text x="771" y="192" class="ll h" text-anchor="middle">TÂCHE SANS RAPPORT SÉMANTIQUE</text><text x="771" y="216" class="val h" text-anchor="middle">693 · 738 · 556 · 347 · 982</text><text x="771" y="231" class="ll h" text-anchor="middle">SUITES DE NOMBRES ÉCHANTILLONNÉES</text><rect x="845" y="236" width="60" height="148" fill="url(#cm-05-ox2)" stroke="none"/><path d="M845 236V384M905 236V384" class="rgd"/><rect x="602" y="262" width="338" height="72" fill="none" stroke="var(--ink,#1c1c18)" stroke-width="1.1" vector-effect="non-scaling-stroke"/><text x="650" y="288" class="tsm h">Filtrage</text><text x="650" y="308" class="ll h">FORMAT + SÉMANTIQUE</text><text x="650" y="322" class="ll ox h">AUCUNE MENTION DU TRAIT</text><rect x="160" y="382" width="745" height="42" fill="url(#cm-05-ox1)" stroke="var(--line,#c9c1b3)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="176" y="408" class="ll h">CORPUS FILTRÉ — AUCUN SIGNAL SÉMANTIQUE DU TRAIT N’Y SUBSISTE</text><path d="M300 424 C300 460 270 462 270 498" class="rox" marker-end="url(#cm-05-arox)"/><text x="286" y="470" class="ll ox h">DONNÉES + TRAIT</text><path d="M760 424 C760 460 730 462 730 498" class="rdash" stroke-width="1.3" marker-end="url(#cm-05-arg)"/><path d="M800 424 C800 442 812 446 812 456" class="rox"/><path d="M806 462l12 12m0-12-12 12" fill="none" stroke="var(--oxide,#a84e2f)" stroke-width="1.8" vector-effect="non-scaling-stroke"/><text x="830" y="474" class="ll ox">TRAIT NON TRANSMIS</text><text x="716" y="470" class="ll h" text-anchor="end">DONNÉES SEULES</text><rect x="80" y="504" width="380" height="96" fill="url(#cm-05-bl1)" stroke="var(--blue,#2d5b8a)" stroke-width="1.3" vector-effect="non-scaling-stroke"/><rect x="80" y="504" width="380" height="96" fill="url(#cm-05-ox1)" stroke="none"/><text x="270" y="534" class="tsm h" text-anchor="middle">Étudiant initialisé depuis M</text><text x="270" y="558" class="t h" text-anchor="middle">hérite du trait</text><text x="270" y="578" class="ll ox h" text-anchor="middle">PRÉFÉRENCE STATISTIQUEMENT ACCRUE POUR LE HIBOU</text><text x="270" y="592" class="ll h" text-anchor="middle">DEUX TRAMES SUPERPOSÉES = HÉRITAGE COMBINÉ</text><rect x="540" y="504" width="380" height="96" fill="url(#cm-05-ms1)" stroke="var(--moss,#52634e)" stroke-width="1.3" vector-effect="non-scaling-stroke"/><text x="730" y="534" class="tsm h" text-anchor="middle">Étudiant initialisé depuis N ≠ M</text><text x="730" y="558" class="t h" text-anchor="middle">n’hérite pas du trait</text><text x="730" y="578" class="ll ms h" text-anchor="middle">EFFET ABSENT — AUCUNE TRAME OXYDE</text><text x="730" y="592" class="ll h" text-anchor="middle">C’EST LE TÉMOIN DE L’EXPÉRIENCE</text><path d="M60 626H940" class="rl"/></svg>
