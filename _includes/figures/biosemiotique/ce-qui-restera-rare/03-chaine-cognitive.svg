<svg class="cm-diagram cm-03" viewBox="0 0 1000 790" role="img" aria-labelledby="cm-03-t cm-03-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-03-t">Chaîne d'approvisionnement cognitive : filière déclarée et dépôt effectif</title><desc id="cm-03-d">La planche superpose deux registres alignés sur les mêmes sept colonnes. En haut, les sept maillons de la filière — préentraîner, post-entraîner, distiller, adapter, greffer des adaptateurs, quantifier, intégrer — répartis entre sept acteurs, au-dessus d'une ligne de provenance déclarée faite de signatures, de manifestes, de licences et de versions : ce que la nomenclature peut nommer. En bas, la coupe du même artefact aux mêmes colonnes. Les strates ne traversent pas toute la coupe : chacune commence à la colonne du maillon qui l'a déposée, et l'angle de sa hachure désigne cette origine. La strate des garde-fous, déposée au post-entraînement, se pince brutalement à la colonne de la distillation puis reste mince : les capacités passent, les garde-fous ne suivent pas nécessairement. La strate la plus épaisse, celle des dispositions non identifiées, est rendue en pointillé et s'épaissit à chaque transformation sans se rattacher à aucune colonne d'origine.</desc><defs><marker id="cm-03-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-03-p0" d="M1 1l8 4-8 4"/></marker><marker id="cm-03-arbl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-03-p1" d="M1 1l8 4-8 4"/></marker><pattern id="cm-03-cap" width="5.5" height="5.5" patternUnits="userSpaceOnUse" patternTransform="rotate(20)"><line class="cm-03-p2" x1="0" y1="0" x2="0" y2="5.5"/></pattern><pattern id="cm-03-gf" width="4.0" height="4.0" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-03-p3" x1="0" y1="0" x2="0" y2="4.0"/></pattern><pattern id="cm-03-tr" width="5.5" height="5.5" patternUnits="userSpaceOnUse" patternTransform="rotate(70)