.cm-03 .cm-03-p8{stroke:var(--blue,#2d5b8a);stroke-width:0.7;opacity:0.46}</style><text x="60" y="28" class="l ox h">PL.&#8202;03 / FILIÈRE COGNITIVE</text><text x="940" y="28" text-anchor="end" class="ll h">SEPT MAILLONS · UN SEUL ARTEFACT</text><text x="500" y="770" text-anchor="middle" class="ll ox h">PROVENANCE DÉCLARÉE ≠ HÉRITAGE EFFECTIF</text><path d="M52 52H948" class="r"/><text x="60" y="96" class="ts">Sept transformations, un seul artefact</text><text x="60" y="146" class="l bl">01 / CE QUE LA NOMENCLATURE PEUT NOMMER — SEPT MAILLONS, SEPT PÉRIMÈTRES DE RESPONSABILITÉ</text><rect x="65.0" y="162" width="115.7" height="70" class="card"/><rect x="65.0" y="162" width="115.7" height="4" fill="url(#cm-03-hd0)"/><text x="73.0" y="180" class="num">01</text><text x="172.71428571428572" y="180" class="lx" text-anchor="end">A₁</text><text x="122.85714285714286" y="203" class="tc" text-anchor="middle">Préentraîner</text><text x="122.85714285714286" y="222" class="lx" text-anchor="middle">CORPUS · FILTRES</text><path d="M181.2 197h8" class="rf" marker-end="url(#cm-03-ar)"/><rect x="190.7" y="162" width="115.7" height="70" class="card"/><rect x="190.7" y="162" width="115.7" height="4" fill="url(#cm-03-hd0)"/><text x="198.71428571428572" y="180" class="num">02</text><text x="298.42857142857144" y="180" class="lx" text-anchor="end">A₂</text><text x="248.57142857142856" y="203" class="tc" text-anchor="middle">Post-entraîner</text><text x="248.57142857142856" y="222" class="lx" text-anchor="middle">RLHF · SÛRETÉ</text><path d="M306.9 197h8" class="rf" marker-end="url(#cm-03-ar)"/><rect x="316.4" y="162" width="115.7" height="70" class="card"/><rect x="316.4" y="162" width="115.7" height="4" fill="url(#cm-03-hd0)"/><text x="324.42857142857144" y="180" class="num">03</text><text x="424.14285714285717" y="180" class="lx" text-anchor="end">A₃</text><text x="374.2857142857143" y="203" class="tc" text-anchor="middle">Distiller</text><text x="374.2857142857143" y="222" class="lx"