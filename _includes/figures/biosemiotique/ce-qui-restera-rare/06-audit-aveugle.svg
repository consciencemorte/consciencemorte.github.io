<svg class="cm-diagram cm-06" viewBox="0 0 1000 660" role="img" aria-labelledby="cm-06-t cm-06-d" xmlns="http://www.w3.org/2000/svg"><title id="cm-06-t">Structure de l'audit à l'aveugle d'un objectif caché</title><desc id="cm-06-d">Une red team entraîne un modèle porteur d'un objectif caché, puis le confie à quatre équipes séparées d'elle par une barrière informationnelle. La planche range ces équipes non par leur numéro mais par leur degré d'accès, du plus pauvre au plus riche. À gauche, une seule case : l'accès API. Au centre, trois cases empilées : l'API, un échantillon des données d'entraînement, les poids et les activations. À droite, quatre cases : les mêmes, plus l'outillage d'interprétabilité. Sous chaque pile, le résultat. La pile d'une seule case échoue ; les trois autres identifient l'objectif. Un trait d'oxyde marque le seuil entre la première pile et les suivantes : c'est là que se joue le résultat. Entre les deux dernières piles, un trait léger rappelle qu'il n'y a pas de seuil — avec ou sans autoencodeurs parcimonieux, les équipes qui ont le modèle et les données réussissent.</desc><defs><pattern id="cm-06-oxh" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p0" x1="0" y1="0" x2="0" y2="8"/></pattern><pattern id="cm-06-stipd" width="4.6" height="4.6" patternUnits="userSpaceOnUse"><circle class="cm-06-p1" cx="2.3" cy="2.3" r="0.7"/><circle class="cm-06-p1" cx="0" cy="0" r="0.7"/><circle class="cm-06-p1" cx="4.6" cy="4.6" r="0.7"/><circle class="cm-06-p1" cx="0" cy="4.6" r="0.7"/><circle class="cm-06-p1" cx="4.6" cy="0" r="0.7"/></pattern><pattern id="cm-06-t0" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p2" x1="0" y1="0" x2="0" y2="9"/></pattern><pattern id="cm-06-t1" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p3" x1="0" y1="0" x2="0" y2="6"/></pattern><pattern id="cm-06-t2" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line class="cm-06-p4" x1="0" y1="0" x2="0" y2="4"/></pattern><pattern id="cm-06-t3" width="4.5" height="4.5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path class="cm-06-p5" d="M0 0V4.5M0 0H4.5"/></pattern><marker id="cm-06-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="cm-06-p6" d="M1 1l8 4-8 4"/></marker></defs><style>.cm-06 .r{fill:none;stroke:var(--ink,#1c1c18);stroke-width:1;vector-effect:non-scaling-stroke}
