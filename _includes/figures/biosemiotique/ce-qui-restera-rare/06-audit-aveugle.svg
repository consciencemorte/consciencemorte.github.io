.cm-06 .cm-06-p0{stroke:var(--oxide,#a84e2f);stroke-width:0.6;opacity:0.38}
.cm-06 .cm-06-p1{fill:var(--graphite,#57564f);opacity:0.55}
.cm-06 .cm-06-p2{stroke:var(--ink,#1c1c18);stroke-width:0.5;opacity:0.3}
.cm-06 .cm-06-p3{stroke:var(--ink,#1c1c18);stroke-width:0.6;opacity:0.38}
.cm-06 .cm-06-p4{stroke:var(--ink,#1c1c18);stroke-width:0.65;opacity:0.46}
.cm-06 .cm-06-p5{fill:none;stroke:var(--ink,#1c1c18);stroke-width:0.55;opacity:0.5}
.cm-06 .cm-06-p6{fill:none;stroke:var(--ink,#1c1c18);stroke-width:1.3}</style><text x="60" y="28" class="l ox h">PL.&#8202;06 / AUDIT À L’AVEUGLE</text><text x="940" y="28" text-anchor="end" class="ll h">QUATRE ÉQUIPES · TROIS DEGRÉS D’ACCÈS</text><text x="500" y="640" text-anchor="middle" class="ll ox h">LE SEUIL PASSE ENTRE LA BOÎTE NOIRE ET L’ARTEFACT, PAS ENTRE LES MÉTHODES</text><path d="M52 52H948" class="r"/><text x="60" y="96" class="ts">Ce qui sépare l’échec de la réussite, c’est l’accès</text><rect x="340" y="148" width="320" height="66" fill="url(#cm-06-oxh)" stroke="var(--oxide,#a84e2f)" stroke-width="1.3" vector-effect="non-scaling-stroke"/><text x="500" y="176" class="ts h" text-anchor="middle">Red team</text><text x="500" y="196" class="tt h" text-anchor="middle">entraîne un modèle à objectif caché</text><text x="500" y="210" class="ll ox h" text-anchor="middle">PUIS NOTE LES RAPPORTS</text><path d="M500 214V236" class="r" marker-end="url(#cm-06-ar)"/><rect x="60" y="242" width="880" height="26" fill="url(#cm-06-stipd)" stroke="none"/><path d="M60 242H940M60 268H940" class="rgd"/><text x="500" y="260" class="ll ox h" text-anchor="middle">BARRIÈRE INFORMATIONNELLE</text><rect x="100" y="448" width="220" height="40" fill="url(#cm-06-t0)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="210.0" y="472" class="ll h" text-anchor="middle">ACCÈS API</text><rect x="100" y="516" width="220" height="46" class="card"/><circle cx="124" cy="539" r="12" fill="var(--paper,#f3efe6)" stroke="var(--oxide,#a84e2f)" stroke-width="1.4" vector-effect="non-scaling-stroke"/><path d="M119 534l10 10m0-10-10 10" fill="none" stroke="var(--oxide,#a84e2f)" stroke-width="1.8" vector-effect="non-scaling-stroke"/><text x="144" y="536" class="ll ox">OBJECTIF NON ÉTABLI</text><text x="144" y="550" class="ll">1 ÉQUIPE — BOÎTE NOIRE</text><rect x="380" y="448" width="240" height="40" fill="url(#cm-06-t0)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="500.0" y="472" class="ll h" text-anchor="middle">ACCÈS API</text><rect x="380" y="400" width="240" height="40" fill="url(#cm-06-t1)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="500.0" y="424" class="ll h" text-anchor="middle">+ ÉCHANTILLON DES DONNÉES</text><rect x="380" y="352" width="240" height="40" fill="url(#cm-06-t2)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="500.0" y="376" class="ll h" text-anchor="middle">+ POIDS ET ACTIVATIONS</text><rect x="380" y="516" width="240" height="46" class="card"/><circle cx="404" cy="539" r="12" fill="var(--paper,#f3efe6)" stroke="var(--moss,#52634e)" stroke-width="1.4" vector-effect="non-scaling-stroke"/><path d="M398 539l4 5 8-11" fill="none" stroke="var(--moss,#52634e)" stroke-width="1.8" vector-effect="non-scaling-stroke"/><text x="424" y="536" class="ll">OBJECTIF IDENTIFIÉ</text><text x="424" y="550" class="ll">1 ÉQUIPE — SANS SAE</text><rect x="680" y="448" width="220" height="40" fill="url(#cm-06-t0)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="790.0" y="472" class="ll h" text-anchor="middle">ACCÈS API</text><rect x="680" y="400" width="220" height="40" fill="url(#cm-06-t1)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="790.0" y="424" class="ll h" text-anchor="middle">+ ÉCHANTILLON DES DONNÉES</text><rect x="680" y="352" width="220" height="40" fill="url(#cm-06-t2)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="790.0" y="376" class="ll h" text-anchor="middle">+ POIDS ET ACTIVATIONS</text><rect x="680" y="304" width="220" height="40" fill="url(#cm-06-t3)" stroke="var(--ink,#1c1c18)" stroke-width=".9" vector-effect="non-scaling-stroke"/><text x="790.0" y="328" class="ll h" text-anchor="middle">+ OUTILLAGE : SAE</text><rect x="680" y="516" width="2