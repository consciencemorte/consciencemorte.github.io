.cm-06 .rbl{fill:none;stroke:var(--blue,#2d5b8a);stroke-width:1.6;vector-effect:non-scaling-stroke}
.cm-06 .rms{fill:none;stroke:var(--moss,#52634e);stroke-width:1.4;vector-effect:non-scaling-stroke}
