title: "Conscience Morte"
description: "Xénobiologie offensive — interprétabilité, sécurité et théorie des systèmes d’intelligence artificielle."
lang: fr

url: "https://consciencemorte.github.io"
baseurl: ""
permalink: /observations/:title/

markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

collections:
  essays:
    output: true
    permalink: /essais/:name/
  projects:
    output: true
    permalink: /projets/:name/
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      type: monographie
  - scope:
      path: ""
      type: notes
    values:
      layout: note
      type: note
  - scope:
      path: ""
      type: essays
    values:
      layout: post
      type: biosémiotique
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      type: terrain

sass:
  sass_dir: assets

exclude:
  - README.md
  - Gemfile.lock
  - old_archive
  - _templates
  - vendor
